name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit SHA to deploy'
        required: true
        default: 'main'
      deploy_production:
        description: 'Deploy to production after staging'
        required: true
        type: boolean
        default: false

concurrency:
  group: cd-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  build_artifact:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.meta.outputs.target_sha }}
    env:
      TARGET_REF: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.ref }}

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF }}

      - name: Resolve target SHA
        id: meta
        run: echo "target_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate
          yarn --version

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install PHP dependencies (prod)
        run: composer install --no-interaction --no-progress --prefer-dist --no-dev --optimize-autoloader

      - name: Install JS dependencies
        run: yarn install --immutable

      - name: Build frontend assets
        run: yarn build

      - name: Create release artifact
        run: |
          tar -czf release.tar.gz \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=tests \
            --exclude=.github \
            --exclude=storage/logs/* \
            .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.meta.outputs.target_sha }}
          path: release.tar.gz
          retention-days: 7

  deploy_staging:
    needs: build_artifact
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.build_artifact.outputs.target_sha }}

      - name: Configure SSH key
        run: |
          test -n "${{ secrets.STAGING_SSH_HOST }}"
          test -n "${{ secrets.STAGING_SSH_USER }}"
          test -n "${{ secrets.STAGING_DEPLOY_PATH }}"
          test -n "${{ secrets.STAGING_SSH_PRIVATE_KEY }}"
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.STAGING_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload artifact to staging
        run: |
          scp release.tar.gz "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}:/tmp/release-${{ needs.build_artifact.outputs.target_sha }}.tar.gz"

      - name: Deploy on staging host
        run: |
          ssh "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            "set -euo pipefail; \
            DEPLOY_PATH='${{ secrets.STAGING_DEPLOY_PATH }}'; \
            RELEASE_PATH=\"\$DEPLOY_PATH/releases/${{ needs.build_artifact.outputs.target_sha }}\"; \
            mkdir -p \"\$DEPLOY_PATH/releases\" \"\$DEPLOY_PATH/shared\"; \
            rm -rf \"\$RELEASE_PATH\"; \
            mkdir -p \"\$RELEASE_PATH\"; \
            tar -xzf /tmp/release-${{ needs.build_artifact.outputs.target_sha }}.tar.gz -C \"\$RELEASE_PATH\"; \
            if [ -f \"\$DEPLOY_PATH/shared/.env\" ]; then cp \"\$DEPLOY_PATH/shared/.env\" \"\$RELEASE_PATH/.env\"; fi; \
            cd \"\$RELEASE_PATH\"; \
            php artisan config:cache; \
            php artisan route:cache; \
            php artisan view:cache; \
            php artisan migrate --force; \
            ln -sfn \"\$RELEASE_PATH\" \"\$DEPLOY_PATH/current\"; \
            rm -f /tmp/release-${{ needs.build_artifact.outputs.target_sha }}.tar.gz"

  smoke_staging:
    needs: deploy_staging
    runs-on: ubuntu-latest

    steps:
      - name: Staging smoke test
        run: |
          test -n "${{ secrets.STAGING_HEALTHCHECK_URL }}"
          curl --fail --silent --show-error "${{ secrets.STAGING_HEALTHCHECK_URL }}"

  deploy_production:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production
    needs:
      - build_artifact
      - smoke_staging
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.build_artifact.outputs.target_sha }}

      - name: Configure SSH key
        run: |
          test -n "${{ secrets.PROD_SSH_HOST }}"
          test -n "${{ secrets.PROD_SSH_USER }}"
          test -n "${{ secrets.PROD_DEPLOY_PATH }}"
          test -n "${{ secrets.PROD_SSH_PRIVATE_KEY }}"
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload artifact to production
        run: |
          scp release.tar.gz "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:/tmp/release-${{ needs.build_artifact.outputs.target_sha }}.tar.gz"

      - name: Deploy on production host
        run: |
          ssh "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
            "set -euo pipefail; \
            DEPLOY_PATH='${{ secrets.PROD_DEPLOY_PATH }}'; \
            RELEASE_PATH=\"\$DEPLOY_PATH/releases/${{ needs.build_artifact.outputs.target_sha }}\"; \
            mkdir -p \"\$DEPLOY_PATH/releases\" \"\$DEPLOY_PATH/shared\"; \
            rm -rf \"\$RELEASE_PATH\"; \
            mkdir -p \"\$RELEASE_PATH\"; \
            tar -xzf /tmp/release-${{ needs.build_artifact.outputs.target_sha }}.tar.gz -C \"\$RELEASE_PATH\"; \
            if [ -f \"\$DEPLOY_PATH/shared/.env\" ]; then cp \"\$DEPLOY_PATH/shared/.env\" \"\$RELEASE_PATH/.env\"; fi; \
            cd \"\$RELEASE_PATH\"; \
            php artisan config:cache; \
            php artisan route:cache; \
            php artisan view:cache; \
            php artisan migrate --force; \
            ln -sfn \"\$RELEASE_PATH\" \"\$DEPLOY_PATH/current\"; \
            rm -f /tmp/release-${{ needs.build_artifact.outputs.target_sha }}.tar.gz"

      - name: Production smoke test
        run: |
          test -n "${{ secrets.PROD_HEALTHCHECK_URL }}"
          curl --fail --silent --show-error "${{ secrets.PROD_HEALTHCHECK_URL }}"
