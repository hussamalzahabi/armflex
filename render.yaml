services:
  - type: web
    name: armflex
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /up
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: 'false'
      - key: APP_URL
        value: https://armflex.onrender.com
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: RUN_MIGRATIONS
        value: 'false'
