services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: armflex:local
        container_name: armflex-app
        depends_on:
            db:
                condition: service_healthy
        ports:
            - '10000:10000'
        env_file:
            - .env.docker
        environment:
            RUN_MIGRATIONS: 'true'
            RUN_SEEDERS: 'true'
        restart: unless-stopped

    db:
        image: postgres:16
        container_name: armflex-db
        environment:
            POSTGRES_DB: armflex
            POSTGRES_USER: armflex
            POSTGRES_PASSWORD: armflex
            PGDATA: /var/lib/postgresql/data/pgdata
        ports:
            - '5433:5432'
        volumes:
            - armflex_db_data:/var/lib/postgresql/data
            - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -h localhost -U armflex -d armflex']
            interval: 5s
            timeout: 3s
            retries: 20
        restart: unless-stopped

volumes:
    armflex_db_data:
