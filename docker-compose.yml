services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                INSTALL_XDEBUG: '1'
        image: armflex:local
        container_name: armflex-app
        depends_on:
            db:
                condition: service_healthy
        ports:
            - '10000:10000'
        env_file:
            - .env.docker
        environment:
            RUN_MIGRATIONS: 'true'
            RUN_SEEDERS: 'true'
            XDEBUG_MODE: ${XDEBUG_MODE:-off}
            XDEBUG_START_WITH_REQUEST: ${XDEBUG_START_WITH_REQUEST:-trigger}
            XDEBUG_CLIENT_HOST: ${XDEBUG_CLIENT_HOST:-host.docker.internal}
            XDEBUG_CLIENT_PORT: ${XDEBUG_CLIENT_PORT:-9003}
            XDEBUG_IDEKEY: ${XDEBUG_IDEKEY:-VSCODE}
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        restart: unless-stopped

    db:
        image: postgres:16
        container_name: armflex-db
        environment:
            POSTGRES_DB: armflex
            POSTGRES_USER: armflex
            POSTGRES_PASSWORD: armflex
            PGDATA: /var/lib/postgresql/data/pgdata
        ports:
            - '5433:5432'
        volumes:
            - armflex_db_data:/var/lib/postgresql/data
            - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -h localhost -U armflex -d armflex']
            interval: 5s
            timeout: 3s
            retries: 20
        restart: unless-stopped

    node:
        image: node:20-bookworm-slim
        container_name: armflex-node
        working_dir: /workspace
        volumes:
            - ./:/workspace
            - armflex_node_modules:/workspace/node_modules
        command: >
            sh -lc "corepack enable
            && corepack prepare yarn@4.13.0 --activate
            && tail -f /dev/null"
        stdin_open: true
        tty: true
        restart: unless-stopped

volumes:
    armflex_db_data:
    armflex_node_modules:
